name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Check if directory exists, if not clone it
            if [ ! -d "business-tracker-backend" ]; then
              git clone https://github.com/avinashtandon/business-tracker-backend.git
            fi
            
            # Navigate to directory
            cd business-tracker-backend
            
            # Pull latest changes from main branch
            git pull origin main
            
            # Create .env file with all production secrets (Telegram + JWT)
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            echo "JWT_PRIVATE_KEY_B64=${{ secrets.JWT_PRIVATE_KEY_B64 }}" >> .env
            echo "JWT_PUBLIC_KEY_B64=${{ secrets.JWT_PUBLIC_KEY_B64 }}" >> .env
            
            # Build and restart docker containers securely
            docker-compose down
            docker-compose up -d --build
