version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: business-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: business_tracker
      MYSQL_USER: business_tracker
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "business_tracker", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: business_tracker-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      APP_NAME: business-tracker-backend
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: business_tracker
      DB_USER: business_tracker
      DB_PASSWORD: secret
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "10"
      DB_CONN_MAX_LIFETIME_MINUTES: "5"
      # IMPORTANT: Replace these with real base64-encoded RSA keys before deploying.
      # Generate with: make generate-keys
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64}
      JWT_PUBLIC_KEY_B64: ${JWT_PUBLIC_KEY_B64}
      JWT_ISSUER: business-tracker-backend
      JWT_AUDIENCE: business-tracker-api
      JWT_ACCESS_TOKEN_TTL_MINUTES: "15"
      JWT_REFRESH_TOKEN_TTL_DAYS: "7"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      RATE_LIMIT_RPS: "5"
      RATE_LIMIT_BURST: "10"
      MIGRATIONS_PATH: "file://migrations"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data:
